<!-- Usuarios - Gestión de usuarios -->
<div>
  <div class="toolbar">
    <div class="toolbar-left">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-user" placeholder="Buscar usuario..." oninput="filterUsers()">
      </div>
    </div>
    <div class="toolbar-right">
      <button class="btn btn-primary" onclick="showAddUserModal()">+ Nuevo Usuario</button>
    </div>
  </div>

  <div class="card">
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Usuario</th>
            <th>Nombre</th>
            <th>Email</th>
            <th>Rol</th>
            <th>Estado</th>
            <th>Creado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="users-table-body">
          <tr><td colspan="7" class="empty-state"><p>Cargando usuarios...</p></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal Usuario -->
<div id="user-modal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="user-modal-title">Nuevo Usuario</h3>
      <button class="modal-close" onclick="closeModal('user-modal')">&times;</button>
    </div>
    <div class="modal-body">
      <form id="user-form">
        <input type="hidden" id="user-id">
        
        <div class="form-row">
          <div class="form-group">
            <label>Usuario</label>
            <input type="text" class="form-control" id="user-username" required>
          </div>
          <div class="form-group">
            <label>Nombre Completo</label>
            <input type="text" class="form-control" id="user-name" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Email</label>
            <input type="email" class="form-control" id="user-email" required>
          </div>
          <div class="form-group">
            <label>Rol</label>
            <select class="form-control" id="user-role">
              <option value="admin">Administrador</option>
              <option value="user">Usuario</option>
              <option value="superadmin">SuperAdmin</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Contraseña</label>
            <input type="password" class="form-control" id="user-password" placeholder="Mínimo 6 caracteres">
          </div>
          <div class="form-group">
            <label>Estado</label>
            <select class="form-control" id="user-status">
              <option value="active">Activo</option>
              <option value="inactive">Inactivo</option>
            </select>
          </div>
        </div>

        <div class="form-group" id="user-client-group">
          <label>Cliente</label>
          <select class="form-control" id="user-client">
            <option value="">Seleccione un cliente...</option>
          </select>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('user-modal')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveUser()">Guardar</button>
    </div>
  </div>
</div>

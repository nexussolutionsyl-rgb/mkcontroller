<!-- Perfil de Usuario -->
<div>
  <div class="grid-2">
    <!-- Información del Perfil -->
    <div class="card">
      <div class="card-header">
        <h3 class="card-title">Mi Perfil</h3>
      </div>
      <div class="card-body">
        <div id="profile-info">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>
    </div>

    <!-- Cambiar Contraseña -->
    <div class="card">
      <div class="card-header">
        <h3 class="card-title">Cambiar Contraseña</h3>
      </div>
      <div class="card-body">
        <form id="change-password-form" onsubmit="return false;">
          <div class="form-group">
            <label>Contraseña Actual</label>
            <input type="password" class="form-control" id="pw-current" required>
          </div>
          <div class="form-group">
            <label>Nueva Contraseña</label>
            <input type="password" class="form-control" id="pw-new" required minlength="6">
          </div>
          <div class="form-group">
            <label>Confirmar Nueva Contraseña</label>
            <input type="password" class="form-control" id="pw-confirm" required minlength="6">
          </div>
          <button class="btn btn-primary" onclick="changePassword()">Actualizar Contraseña</button>
        </form>
        <div id="password-result" style="margin-top:12px;"></div>
      </div>
    </div>
  </div>
</div>
